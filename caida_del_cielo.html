<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAÍDA DEL CIELO // BLASFEMIA_PIXEL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --sky-bg: #0d001a;
            --demon-red: #ff2200;
            --angel-white: #ffffff;
            --celestial-gold: #ffcc00;
        }

        body {
            margin: 0; padding: 0;
            background: #000;
            color: var(--demon-red);
            font-family: 'JetBrains Mono', monospace;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            text-transform: uppercase;
        }

        #game-container {
            position: relative;
            border: 4px solid var(--demon-red);
            box-shadow: 0 0 50px rgba(255, 34, 0, 0.4);
            background: var(--sky-bg);
            overflow: hidden;
        }

        canvas { display: block; background: #000; }

        .ui {
            position: absolute; top: -45px; width: 100%;
            display: flex; justify-content: space-between;
            font-size: 1.2rem; letter-spacing: 3px;
            font-weight: bold;
        }

        .overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; z-index: 20;
            border: 1px solid var(--demon-red);
        }

        .btn {
            margin-top: 25px; padding: 15px 40px;
            border: 2px solid var(--demon-red);
            background: transparent; color: var(--demon-red);
            cursor: pointer; font-family: inherit;
            font-size: 1rem; transition: 0.3s;
            font-weight: bold; letter-spacing: 2px;
        }

        .btn:hover { background: var(--demon-red); color: #000; box-shadow: 0 0 30px var(--demon-red); }

        /* CRT Effect */
        #game-container::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 15; background-size: 100% 3px; pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui">
            <span>BLASFEMIAS: <span id="score">0</span></span>
            <span>PECADOS: <span id="lives">3</span></span>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="overlay" class="overlay">
            <h1 style="font-size: 3rem; margin: 0; text-shadow: 0 0 20px #ff2200;">CAÍDA DEL CIELO</h1>
            <p style="letter-spacing: 4px; margin-top: 15px; opacity: 0.7;">DERRIBA A LOS HIJOS DE LA LUZ.<br>CADA ALMA TIENE SU PROPIO VUELO.</p>
            <button class="btn" onclick="startGame()">PROFANAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 750;

        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let player = { x: 300, y: 680, w: 40, h: 40 };
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let frame = 0;

        class Enemy {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.type = type;
                this.startX = x;
                this.seed = Math.random() * 100;
                this.alive = true;
                this.speed = 1 + Math.random();
                this.swing = 20 + Math.random() * 50;
            }
            update() {
                if (!this.alive) return;
                // Unique trajectories (Slower for playability)
                if (this.type === 'seraph') {
                    this.y += 0.15;
                    this.x = this.startX + Math.sin(frame * 0.02 + this.seed) * this.swing;
                } else if (this.type === 'angel') {
                    this.y += 0.25;
                    this.x = this.startX + Math.cos(frame * 0.03 + this.seed) * (this.swing * 1.5);
                } else {
                    this.y += 0.4;
                    this.x = this.startX + Math.sin(frame * 0.05 + this.seed) * 30;
                }
            }
            draw() {
                if (!this.alive) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                const t = frame * 0.1 + this.seed;

                if (this.type === 'seraph') {
                    // Golden Seraphim Eye
                    ctx.fillStyle = '#ffcc00';
                    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
                    for(let i=0; i<6; i++) {
                        ctx.rotate(Math.PI/3);
                        ctx.beginPath(); ctx.ellipse(15 + Math.sin(t)*3, 0, 18, 6, 0, 0, Math.PI*2); ctx.stroke();
                    }
                    ctx.shadowBlur = 15; ctx.shadowColor = '#ffcc00'; ctx.stroke();
                } else if (this.type === 'angel') {
                    // Winged Humanoid
                    ctx.fillStyle = '#fff';
                    // Body
                    ctx.beginPath(); ctx.moveTo(-5, 10); ctx.lineTo(0, -10); ctx.lineTo(5, 10); ctx.fill();
                    ctx.beginPath(); ctx.arc(0, -12, 4, 0, Math.PI*2); ctx.fill();
                    // Wings
                    const wingSpan = 15 + Math.sin(t)*5;
                    ctx.beginPath(); ctx.ellipse(-12, -2, wingSpan, 8, 0.4, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.ellipse(12, -2, wingSpan, 8, -0.4, 0, Math.PI*2); ctx.fill();
                } else {
                    // White Pigeon
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.ellipse(0, 0, 8, 5, 0, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(8, -2, 3, 0, Math.PI*2); ctx.fill();
                    // Flapping wings
                    const flap = Math.sin(t * 2) * 12;
                    ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(-10, flap); ctx.lineTo(-5, 0); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(10, flap); ctx.lineTo(5, 0); ctx.fill();
                }
                ctx.restore();
            }
        }

        function createEnemies() {
            enemies = [];
            for(let r=0; r<4; r++) {
                for(let c=0; c<8; c++) {
                    let type = r === 0 ? 'seraph' : (r < 2 ? 'angel' : 'pigeon');
                    enemies.push(new Enemy(60 + c*65, 50 + r*70, type));
                }
            }
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            score = 0; lives = 3; bullets = []; enemyBullets = [];
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            createEnemies();
            gameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!gameRunning) return;
            frame++;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Demon (Pixelish Path)
            ctx.fillStyle = '#ff2200';
            ctx.shadowBlur = 20; ctx.shadowColor = '#ff2200';
            const dx = player.x, dy = player.y;
            ctx.beginPath();
            ctx.moveTo(dx-20, dy+20); ctx.lineTo(dx-15, dy-5); ctx.lineTo(dx, dy-25);
            ctx.lineTo(dx+15, dy-5); ctx.lineTo(dx+20, dy+20); ctx.lineTo(dx, dy+10);
            ctx.fill();
            // Sharp Horns
            ctx.beginPath();
            ctx.moveTo(dx-12, dy-15); ctx.lineTo(dx-20, dy-35); ctx.lineTo(dx-5, dy-18);
            ctx.moveTo(dx+12, dy-15); ctx.lineTo(dx+20, dy-35); ctx.lineTo(dx+5, dy-18);
            ctx.fill();
            // Glowing Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(dx-8, dy-10, 4, 2); ctx.fillRect(dx+4, dy-10, 4, 2);
            ctx.shadowBlur = 0;

            // Enemies logic
            enemies.forEach(e => {
                if (!e.alive) return;
                e.update();
                e.draw();
                // Spaced firing (Even more spaced)
                if (Math.random() > 0.9992) {
                    let bulletType = e.type;
                    enemyBullets.push({x: e.x, y: e.y, type: bulletType, speed: bulletType === 'seraph' ? 4 : 2.5});
                }
                if (e.y > 650) endGame('EL CIELO TE HA RECLAMADO.');
            });

            // Player Bullets
            bullets = bullets.filter(b => {
                b.y -= 8;
                ctx.fillStyle = '#ff2200';
                ctx.fillRect(b.x-2, b.y, 4, 15);
                let hit = false;
                enemies.forEach(e => {
                    if (e.alive && b.x > e.x-20 && b.x < e.x+20 && b.y > e.y-20 && b.y < e.y+20) {
                        e.alive = false; hit = true; score += (e.type === 'seraph' ? 150 : (e.type === 'angel' ? 70 : 30));
                        document.getElementById('score').textContent = score;
                    }
                });
                return !hit && b.y > 0;
            });

            // Enemy Bullets (Unique behaviors)
            enemyBullets = enemyBullets.filter(b => {
                b.y += b.speed;
                if (b.type === 'seraph') {
                    ctx.fillStyle = '#ffcc00'; ctx.fillRect(b.x-1, b.y, 3, 20);
                } else if (b.type === 'angel') {
                    ctx.fillStyle = '#fff'; 
                    ctx.beginPath(); ctx.ellipse(b.x, b.y, 4, 10, Math.sin(frame*0.1), 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill();
                }
                
                if (b.x > player.x-15 && b.x < player.x+15 && b.y > player.y-15 && b.y < player.y+15) {
                    lives--; document.getElementById('lives').textContent = lives;
                    if (lives <= 0) endGame('TU ALMA HA SIDO PURIFICADA.');
                    return false;
                }
                return b.y < 750;
            });

            if (enemies.every(e => !e.alive)) createEnemies();

            requestAnimationFrame(gameLoop);
        }

        function endGame(msg) {
            gameRunning = false;
            const overlay = document.getElementById('overlay');
            overlay.innerHTML = `<h1>${msg}</h1><button class="btn" onclick="startGame()">REINTENTAR</button>`;
            overlay.style.display = 'flex';
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && player.x > 30) player.x -= 25;
            if (e.key === 'ArrowRight' && player.x < 570) player.x += 25;
            if (e.key === ' ' || e.key === 'ArrowUp') {
                if (bullets.length < 4) bullets.push({x: player.x, y: player.y-25});
            }
        });
    </script>
</body>
</html>
