<!DOCTYPE html>
<html lang="es">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --term-amber: #ffcc00;
            --term-bright: #ffff00;
            --term-orange: #ff6600;
            --term-bg: #050500;
            --term-glow: rgba(255, 204, 0, 0.4);
            --scanline-color: rgba(255, 204, 0, 0.08);
            --blood-orange: #ff4400;
            --font-main: 'JetBrains+Mono', monospace;
        }

        * { box-sizing: border-box; cursor: crosshair; }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: var(--term-amber);
            font-family: var(--font-main);
            height: 100%; 
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: fixed; /* Prevents scroll bounce and enforces bounds */
        }

        .container {
            position: relative;
            width: 100%; height: 100%;
            background: var(--term-bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 150px rgba(0,0,0,1);

        /* Screen SFX */
        .grime {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(40, 30, 0, 0.1) 0%, transparent 70%),
                        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.12; pointer-events: none; z-index: 10000;
        }
        .stains {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(ellipse at 80% 80%, rgba(136, 0, 0, 0.08) 0%, transparent 40%),
                        radial-gradient(ellipse at 10% 20%, rgba(50, 20, 0, 0.1) 0%, transparent 40%);
            pointer-events: none; z-index: 10001;
        }
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(var(--scanline-color) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 3px; pointer-events: none; z-index: 10002;
            animation: scanline 0.15s linear infinite;
        }
        @keyframes scanline { 0% { background-position: 0 0; } 100% { background-position: 0 3px; } }
        .crt-vignette {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.92) 130%);
            pointer-events: none; z-index: 10003;
        }

        #terminal {
            flex: 1; padding: 20px 20px;
            overflow-y: auto;
            overflow-x: hidden;
            box-sizing: border-box;
            width: 100%;
            max-width: 100vw;

            text-shadow: 0 0 5px var(--term-glow);
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
            z-index: 10;
        }

        .line { margin-bottom: 10px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; opacity: 0.9; }

        /* Header */

            border-bottom: 1px solid rgba(255, 204, 0, 0.15); padding-bottom: 30px;
            position: relative;

        .lang-selector {

            background: rgba(20, 20, 0, 0.8);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.1);

        .lang-btn {

            border-right: 1px solid rgba(255, 204, 0, 0.2); color: #4a4a4a;
        }
        .lang-btn:hover { background: rgba(255, 204, 0, 0.1); color: var(--term-bright); }
        /* --- MINIGAME STYLES --- */
        /* --- MINIGAME STYLES (RESTORED IDENTITIES) --- */

        #eat-mann-container { color: #ff0000; }

        #sky-container { color: #ff2200; }

        .game-btn:hover { background: #ff0000; color: #000; box-shadow: 0 0 20px #ff0000; }
        /* CRT Scanlines Effect */
        .scanlines::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));

        }
        .taskbar-app-icon:hover { opacity: 1; transform: translateY(-2px); }

        .desktop-window {

        const MemorySystem = {
            sequence: [], input: [], mode: 'captcha',
            init(fileOrFolder, mode = 'captcha') {
                pendingFile = fileOrFolder; this.mode = mode;
                this.sequence = []; this.input = [];
                for(let i=0; i<4; i++) this.sequence.push(Math.floor(Math.random()*8));
                
                captchaOverlay.style.display = 'flex';
                document.getElementById('captcha-msg').textContent = mode === 'captcha' ? '[HUMANITY_VERIFICATION]' : '[FILE_DECRYPTION_PROTOCOL]';
                this.show();
            },
            async show() {
                const pads = document.querySelectorAll('.simon-pad');
                document.getElementById('captcha-hint').textContent = "WATCH THE SEQUENCE";
                for(let i of this.sequence) {
                    await new Promise(r => setTimeout(r, 600));
                    pads[i].classList.add('active');
                    await new Promise(r => setTimeout(r, 400));
                    pads[i].classList.remove('active');
                }
                document.getElementById('captcha-hint').textContent = "REPEAT THE SEQUENCE";
            },
            click(i) {
                const pads = document.querySelectorAll('.simon-pad');
                pads[i].classList.add('active');
                setTimeout(() => pads[i].classList.remove('active'), 200);
                this.input.push(i);
                if (this.input[this.input.length-1] !== this.sequence[this.input.length-1]) {
                    this.init(pendingFile, this.mode);
                } else if (this.input.length === this.sequence.length) {
                    setTimeout(() => {
                        captchaOverlay.style.display = 'none';
                        if (this.mode === 'captcha') { 
                            humanVerified = true; 
                            if (pendingFile && pendingFile.type === 'folder') {
                                unlockedFolders.add(pendingFile.name);
                                openFolder(pendingFile.name, pendingFile.content);
                            } else {
                                openWindow(pendingFile); 
                            }
                        }
                        else { renderFinal(pendingFile); }
                    }, 500);
                }
            }
        };

        const COMMANDS = {
            'ls': () => {
                const loc = LOCALES[currentLang];

                if (old) old.remove();

                const container = document.createElement('div');
                container.id = 'persistent-ls';

                const structure = {

                };

                Object.keys(DATABASE).forEach(k => {
                    const f = DATABASE[k];
                    const cat = f.private ? 'private' : 'public';
                    let type = 'text';
                    if (f.type === 'jpg') type = 'image';
                    if (f.type === 'mp4') type = 'video';
                    structure[cat][type].push({ key: k, info: f });
                });

                const renderBranch = (name, data, isPrivate) => {
                    const b = document.createElement('div');
                    b.className = 'line';
                    const localizedCat = isPrivate ? loc.cat_private : loc.cat_public;
                    b.innerHTML = `<span style="color:var(--term-bright)">/${localizedCat}</span>`;
                    container.appendChild(b);

                    const types = ['text', 'image', 'video'];
                    types.forEach((type) => {
                        if (data[type].length === 0) return;
                        const tb = document.createElement('div');

                        tb.style.paddingLeft = '20px';
                        const localizedType = loc[`type_${type}`];
                        tb.innerHTML = `<span style="color:var(--term-orange)">└─ ${localizedType}</span>`;

                        data[type].forEach(file => {

                renderBranch("public", structure.public, false);
                renderBranch("private", structure.private, true);
                terminal.scrollTop = terminal.scrollHeight;
                return "";

        function initEatEngine() {
            const canvas = document.getElementById('eat-canvas');
            const ctx = canvas.getContext('2d');
            const tileSize = 30;
            const rows = 15;
            const cols = 20;
            canvas.width = cols * tileSize;
            canvas.height = rows * tileSize;
            let score = 0, level = 1, frame = 0;
            let player = { x: 1, y: 1, dir: { x: 0, y: 0 }, nextDir: { x: 0, y: 0 } };
            let enemies = [], dots = [], maze = [];
            let gameLoop = null;

            function generateMaze() {
                maze = Array.from({length: rows}, () => Array(cols).fill(1));
                for(let r=1; r<4; r++) for(let c=1; c<4; c++) maze[r][c] = 0;
                let x = 1, y = 1;
                for(let i=0; i<600; i++) {
                    const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
                    const d = dirs[Math.floor(Math.random()*4)];
                    const nx = x + d.x, ny = y + d.y;
                    if (nx > 0 && nx < cols-1 && ny > 0 && ny < rows-1) { maze[ny][nx] = 0; x = nx; y = ny; }
                }
                dots = [];
                for(let r=1; r<rows-1; r++) {
                    for(let c=1; c<cols-1; c++) {
                        if (maze[r][c] === 0) dots.push({x: c, y: r, collected: false});
                    }
                }
                enemies = [];
                for(let i=0; i<level+1; i++) {
                    let ex = cols-2, ey = rows-2;
                    while(maze[ey][ex] === 1) { ex--; if(ex<4){ex=cols-2; ey--;} }
                    enemies.push({x: ex, y: ey, dir: {x: -1, y: 0}});
                }
            }

            window.startEat = () => {
                const overlay = document.getElementById('eat-overlay');
                if(overlay) overlay.style.display = 'none';
                const dpad = document.getElementById('eat-dpad');
                if(dpad) dpad.style.display = 'grid';
                score = 0; level = 1;
                player = { x: 1, y: 1, dir: { x: 0, y: 0 }, nextDir: { x: 0, y: 0 } };
                document.getElementById('eat-score').textContent = score;
                document.getElementById('eat-lvl').textContent = level;
                generateMaze();
                if (gameLoop) clearInterval(gameLoop);
                gameLoop = setInterval(update, 130);
            };
            window.eatDir = (dir) => { player.nextDir = dir; };

            function update() {
                const nextX = player.x + player.nextDir.x;
                const nextY = player.y + player.nextDir.y;
                if (maze[nextY] && maze[nextY][nextX] === 0) player.dir = player.nextDir;
                if (maze[player.y + player.dir.y] && maze[player.y + player.dir.y][player.x + player.dir.x] === 0) {
                    player.x += player.dir.x; player.y += player.dir.y;
                }
                dots.forEach(d => {
                    if (d.x === player.x && d.y === player.y && !d.collected) {
                        d.collected = true; score += 10; document.getElementById('eat-score').textContent = score;
                    }
                });
                if (dots.every(d => d.collected)) {
                    level++;
                    if (level > 3) endGame('HAS TRASCENDIDO EL CONSUMO FINAL.');
                    else {
                        document.getElementById('eat-lvl').textContent = level;
                        player.x = 1; player.y = 1; player.dir = {x:0,y:0}; player.nextDir = {x:0,y:0};
                        generateMaze();
                    }
                }
                enemies.forEach(e => {
                    if (Math.random() > 0.7) {
                        const d = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}][Math.floor(Math.random()*4)];
                        if (maze[e.y + d.y] && maze[e.y + d.y][e.x + d.x] === 0) e.dir = d;
                    }
                    if (maze[e.y + e.dir.y] && maze[e.y + e.dir.y][e.x + e.dir.x] === 0) { e.x += e.dir.x; e.y += e.dir.y; }
                    if (e.x === player.x && e.y === player.y) endGame('EL OLVIDO TE HA CONSUMIDO.');
                });
                draw();
            }

            function draw() {
                ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff0000'; ctx.font = '20px JetBrains Mono'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const wallChar = level === 1 ? '9' : (level === 2 ? '7' : '3');
                for(let r=0; r<rows; r++) for(let c=0; c<cols; c++) if (maze[r][c] === 1) ctx.fillText(wallChar, c*tileSize + tileSize/2, r*tileSize + tileSize/2);
                ctx.fillStyle = '#ff0000'; dots.forEach(d => { if (!d.collected) { ctx.beginPath(); ctx.arc(d.x*tileSize + tileSize/2, d.y*tileSize + tileSize/2, 2, 0, Math.PI*2); ctx.fill(); } });
                ctx.fillStyle = '#ff6600'; ctx.shadowBlur = 10; ctx.shadowColor = '#ff6600';
                const px = player.x*tileSize + tileSize/2, py = player.y*tileSize + tileSize/2;
                ctx.beginPath(); ctx.arc(px, py, 10, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(px-8, py-5); ctx.lineTo(px-15, py-18); ctx.lineTo(px-2, py-8); ctx.moveTo(px+8, py-5); ctx.lineTo(px+15, py-18); ctx.lineTo(px+2, py-8); ctx.fill();
                ctx.shadowBlur = 0; ctx.fillStyle = '#00ffff';
                enemies.forEach(e => {
                    const ex = e.x*tileSize + tileSize/2, ey = e.y*tileSize + tileSize/2;
                    ctx.beginPath(); ctx.moveTo(ex-12, ey+12); ctx.lineTo(ex, ey-12); ctx.lineTo(ex+12, ey+12); ctx.fill();
                    ctx.shadowBlur = 15; ctx.shadowColor = '#00ffff'; ctx.stroke(); ctx.shadowBlur = 0;
                });
            }

            function endGame(msg) {
                clearInterval(gameLoop); gameLoop = null;
                const overlay = document.getElementById('eat-overlay');
                overlay.innerHTML = `<h1 style="color:#ff0000; text-shadow: 0 0 20px #f00;">${msg}</h1><button class="game-btn" onclick="startEat()">REINTENTAR</button>`;
                overlay.style.display = 'flex';
            }

            const handler = (e) => {
                if (!document.body.contains(canvas)) {
                    window.removeEventListener('keydown', handler);
                    return;
                }
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    if (e.key === 'ArrowUp') player.nextDir = {x: 0, y: -1};
                    if (e.key === 'ArrowDown') player.nextDir = {x: 0, y: 1};
                    if (e.key === 'ArrowLeft') player.nextDir = {x: -1, y: 0};
                    if (e.key === 'ArrowRight') player.nextDir = {x: 1, y: 0};
                }
            };
            window.addEventListener('keydown', handler);
        }
        /* --- OJO DE AMBAR ENGINE (EXACT PORT) --- */
        function openOjo() {
            const body = createWin('EL OJO DE ÁMBAR // 973', 'exe');
            body.innerHTML = `
                <div id="ojo-container" class="game-window-body scanlines">
                    <div class="game-ui-base" style="left:40px;">RESIDUOS: <span id="ojo-score">0</span> / 50</div>
                    <div class="game-ui-base" style="right:40px;">AMARRE: <span id="ojo-lvl">1</span> | <span id="ojo-sanity">100</span>%</div>
                    <canvas id="ojo-canvas" class="game-canvas-base" width="600" height="600" style="background:#ffb000; border-color:#000; cursor:none;"></canvas>
                    <div id="ojo-overlay" class="game-overlay-base" style="background:#ffb000; color:#000; border-color:#000;">
                        <h1 style="font-size: 2.5rem; border-bottom: 4px solid #000; margin:0;">EL OJO DE ÁMBAR</h1>
                        <p style="margin-top:20px; font-weight:bold;">RECOLECTA 50 RESIDUOS PARA EL SIGUIENTE AMARRE.</p>
                        <button class="game-btn" style="border-color:#000; color:#000;" onclick="window.startOjo()">BORRARSE</button>
                    </div>
                </div>
            `;
            const canvas = document.getElementById('ojo-canvas');
            const ctx = canvas.getContext('2d');
            let score = 0, level = 1, sanity = 100, frame = 0, gameRunning = false;
            let bullets = [], fragments = [], mouseX = 300, mouseY = 300;
            
            const updateMouse = (e) => {
                const r = canvas.getBoundingClientRect();
                const scaleX = canvas.width / r.width;
                const scaleY = canvas.height / r.height;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                mouseX = (clientX - r.left) * scaleX; 
                mouseY = (clientY - r.top) * scaleY;
            };
            canvas.onmousemove = updateMouse;
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); updateMouse(e); }, {passive: false});
            
            class Bullet {
                constructor(x, y, angle, speed) {
                    this.x = x; this.y = y;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.size = 8 + Math.random() * 8;
                    this.char = String.fromCharCode(0x2600 + Math.random() * 100);
                    this.color = Math.random() > 0.8 ? '#ff0000' : '#000000';
                }
                update() { this.x += this.vx; this.y += this.vy; }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.font = `bold ${this.size * 2}px 'JetBrains Mono', monospace`;
                    ctx.fillText(this.char, this.x, this.y);
                }
            }
            class Frag {
                constructor() { this.x = 80 + Math.random() * 440; this.y = 80 + Math.random() * 440; this.rot = 0; }
                draw() {
                    this.rot += 0.05; ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot);
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.strokeRect(-12, -12, 24, 24);
                    ctx.fillStyle = '#ff0000'; ctx.fillRect(-5, -5, 10, 10); ctx.restore();
                }
            }

            window.startOjo = () => { document.getElementById('ojo-overlay').style.display = 'none'; score=0; level=1; sanity=100; bullets=[]; fragments=[]; gameRunning=true; loop(); };
            
            function loop() {
                if(!gameRunning) return;
                frame++; ctx.fillStyle = '#ffb000'; ctx.fillRect(0, 0, 600, 600);
                const cx = 300, cy = 300;
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
                for(let i=0; i<3; i++) {
                    const s = (frame * (1 + level * 0.2) + i * 100) % 300;
                    ctx.globalAlpha = 1 - (s / 300); ctx.strokeRect(cx - s/2, cy - s/2, s, s);
                }
                ctx.globalAlpha = 1; ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(cx, cy, 45 + Math.sin(frame*0.1)*5, 0, Math.PI*2); ctx.fill();
                
                if(frame % (Math.max(10, 25 - level * 3)) === 0) bullets.push(new Bullet(cx, cy, Math.random() * Math.PI * 2, 2.5 + level * 0.5 + Math.random() * 2));
                if(fragments.length < 2 && Math.random() > 0.98) fragments.push(new Frag());
                
                bullets = bullets.filter(b => {
                    b.update(); b.draw();
                    const d = Math.hypot(b.x - mouseX, b.y - mouseY);
                    if(d < 20) { sanity -= 2; document.getElementById('ojo-sanity').textContent = Math.max(0, sanity); ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,600,600); return false; }
                    return b.x > -100 && b.x < 700 && b.y > -100 && b.y < 700;
                });
                fragments = fragments.filter(f => {
                    f.draw();
                    if(Math.hypot(f.x - mouseX, f.y - mouseY) < 25) { score++; document.getElementById('ojo-score').textContent = score; if(score >= 50) { level++; score=0; sanity=100; document.getElementById('ojo-lvl').textContent = level; document.getElementById('ojo-sanity').textContent = 100; bullets=[]; } return false; }
                    return true;
                });
                
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(mouseX, mouseY, 10, 0, Math.PI*2); ctx.fill();
                ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(mouseX, mouseY); ctx.lineTo(mouseX + Math.sin(frame*0.2)*12, mouseY + 18); ctx.stroke();
                
                if(sanity <= 0) { gameRunning = false; document.getElementById('ojo-overlay').style.display = 'flex'; document.getElementById('ojo-overlay').innerHTML = `<h1 style="font-size:2rem;">DISUELTO</h1><button class="game-btn" style="border-color:#000; color:#000;" onclick="startOjo()">REINTENTAR</button>`; return; }
                requestAnimationFrame(loop);
            }
        }

            let score = 0, level = 1, lives = 3, frame = 0, playerX = 300, gameRunning = false;
            let bullets = [], enemies = [], eb = [];
            const py = 560;
            
            class En {
                constructor(x, y, type) {
                    this.x = x; this.y = y; this.type = type; this.startX = x;
                    this.seed = Math.random() * 100; this.alive = true;
                    this.swing = 20 + Math.random() * 50;
                    this.speedMod = 1 + (level - 1) * 0.2;
                }
                update() {
                    if(!this.alive) return;
                    if(this.type === 'seraph') { this.y += 0.15 * this.speedMod; this.x = this.startX + Math.sin(frame * 0.02 + this.seed) * this.swing; }
                    else if(this.type === 'angel') { this.y += 0.25 * this.speedMod; this.x = this.startX + Math.cos(frame * 0.03 + this.seed) * (this.swing * 1.5); }
                    else { this.y += 0.4 * this.speedMod; this.x = this.startX + Math.sin(frame * 0.05 + this.seed) * 30; }
                }
                draw() {
                    if(!this.alive) return; ctx.save(); ctx.translate(this.x, this.y); const t = frame * 0.1 + this.seed;
                    if(this.type === 'seraph') {
                        ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
                        for(let i=0; i<6; i++) { ctx.rotate(Math.PI/3); ctx.beginPath(); ctx.ellipse(15 + Math.sin(t)*3, 0, 18, 6, 0, 0, Math.PI*2); ctx.stroke(); }
                    } else if(this.type === 'angel') {
                        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(-5, 10); ctx.lineTo(0, -10); ctx.lineTo(5, 10); ctx.fill();
                        ctx.beginPath(); ctx.arc(0, -12, 4, 0, Math.PI*2); ctx.fill();
                        const ws = 15 + Math.sin(t)*5; ctx.beginPath(); ctx.ellipse(-12, -2, ws, 8, 0.4, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.ellipse(12, -2, ws, 8, -0.4, 0, Math.PI*2); ctx.fill();
                    } else {
                        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(0, 0, 8, 5, 0, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(8, -2, 3, 0, Math.PI*2); ctx.fill();
                        const flap = Math.sin(t * 2) * 12; ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(-10, flap); ctx.lineTo(-5, 0); ctx.fill();
                        ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(10, flap); ctx.lineTo(5, 0); ctx.fill();
                    }
                    ctx.restore();
                }
            }

            let moveDir = 0;
            window.skyDirStart = (dir) => { moveDir = dir; };
            window.skyDirStop = () => { moveDir = 0; };
            window.skyShoot = () => { if(bullets.length<4) bullets.push({x:playerX, y:py-20}); };

            window.startSky = () => { 
                document.getElementById('sky-overlay').style.display = 'none'; 
                const dpad = document.getElementById('sky-dpad');
                const btn = document.getElementById('sky-action');
                if(dpad) dpad.style.display = 'grid';
                if(btn) btn.style.display = 'flex';
                score=0; level=1; lives=3; eb=[]; bullets=[]; spawnEnemies(); gameRunning=true; loop(); 
            };
            
            function spawnEnemies() {
                enemies = [];
                for(let r=0; r<4; r++) for(let c=0; c<8; c++) enemies.push(new En(60+c*65, 50+r*70, r==0?'seraph':(r<2?'angel':'pigeon')));
            }

            function loop() {
                if(!gameRunning) return; frame++; ctx.fillStyle = '#000'; ctx.fillRect(0,0,600,600);
                
                if (moveDir === -1 && playerX > 30) playerX -= 12;
                if (moveDir === 1 && playerX < 570) playerX += 12;

                ctx.fillStyle = '#ff2200'; ctx.shadowBlur=20; ctx.shadowColor='#ff2200';
                ctx.beginPath(); ctx.moveTo(playerX-20, py+20); ctx.lineTo(playerX-15, py-5); ctx.lineTo(playerX, py-25); ctx.lineTo(playerX+15, py-5); ctx.lineTo(playerX+20, py+20); ctx.lineTo(playerX, py+10); ctx.fill();
                ctx.beginPath(); ctx.moveTo(playerX-12, py-15); ctx.lineTo(playerX-20, py-35); ctx.lineTo(playerX-5, py-18); ctx.moveTo(playerX+12, py-15); ctx.lineTo(playerX+20, py-35); ctx.lineTo(playerX+5, py-18); ctx.fill();
                ctx.shadowBlur=0;
                
                enemies = enemies.filter(e => {
                    e.update(); e.draw();
                    if(e.y > 550 && e.alive) { lives--; document.getElementById('sky-lives').textContent = Math.max(0, lives); return false; }
                    return e.alive;
                });
                if(enemies.length === 0) { level++; document.getElementById('sky-lvl').textContent = level; spawnEnemies(); }

                if(Math.random()>0.98) {
                    const active = enemies.filter(e=>e.alive);
                    if(active.length>0) {
                        const e = active[Math.floor(Math.random()*active.length)];
                        eb.push({x:e.x, y:e.y, t:e.type, s:(e.type=='seraph'?4:2.5) * (1+(level-1)*0.1)});
                    }
                }
                
                bullets = bullets.filter(b => {
                    b.y -= 8; ctx.fillStyle='#ff2200'; ctx.fillRect(b.x-2, b.y, 4, 15);
                    enemies.forEach(e => { if(e.alive && Math.hypot(b.x-e.x, b.y-e.y)<20) { e.alive=false; score+=(e.type=='seraph'?150:(e.type=='angel'?70:30)); document.getElementById('sky-score').textContent = score; } });
                    return b.y > 0;
                });
                
                eb = eb.filter(b => {
                    b.y += b.s; ctx.fillStyle='#fff';
                    if(b.t=='seraph'){ ctx.fillStyle='#fc0'; ctx.fillRect(b.x-1, b.y, 3, 20); }
                    else if(b.t=='angel'){ ctx.beginPath(); ctx.ellipse(b.x, b.y, 4, 10, Math.sin(frame*0.1), 0, Math.PI*2); ctx.fill(); }
                    else { ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill(); }
                    if(Math.hypot(b.x-playerX, b.y-py)<25) { lives--; document.getElementById('sky-lives').textContent = Math.max(0, lives); return false; }
                    return b.y < 600;
                });
                
                if(lives <= 0) { gameRunning=false; document.getElementById('sky-overlay').style.display='flex'; document.getElementById('sky-overlay').innerHTML=`<h1>PURIFICADO</h1><button class="game-btn" onclick="startSky()">REINTENTAR</button>`; return; }
                requestAnimationFrame(loop);
            }
            const handler = (e) => {
                if (!document.body.contains(canvas)) {
                    window.removeEventListener('keydown', handler);
                    return;
                }
                if (['ArrowLeft', 'ArrowRight', 'ArrowUp', ' '].includes(e.key)) {
                    e.preventDefault();
                    if(e.key == 'ArrowLeft' && playerX>30) playerX -= 25; 
                    if(e.key == 'ArrowRight' && playerX<570) playerX += 25;
                    if(e.key == ' ' || e.key == 'ArrowUp') if(bullets.length<4) bullets.push({x:playerX, y:py-20});
                }
            };
            window.addEventListener('keydown', handler);
        }

        function toggleStartMenu() {
            const menu = document.getElementById('start-menu');
            const isVisible = menu.style.display === 'flex';
            menu.style.display = isVisible ? 'none' : 'flex';
            if (!isVisible) updateRecentFiles();
        }

        function updateRecentFiles() {
            const list = document.getElementById('recent-files-list');
            list.innerHTML = "";
            Object.keys(DATABASE).slice(-5).reverse().forEach(key => {
                const f = DATABASE[key];
                const item = document.createElement('div');
                item.className = 'start-item';
                item.innerHTML = `<span>${f.type === 'mp4' ? '🎬' : '📝'}</span> ${f[currentLang].title}`;
                item.onclick = () => { openWindow(f); toggleStartMenu(); };
                list.appendChild(item);
            });
        }

        function openApp(type) {
            const appNames = { 'video': 'Video Player', 'image': 'Photo Gallery', 'txt': 'NotePad' };
            const body = createWin(appNames[type]);
            body.innerHTML = `
                <div style="margin-bottom:20px; color:#555; font-size:0.8rem; font-family:var(--font-main);">CHOOSE A FILE TO OPEN:</div>
                <div class="app-grid"></div>
            `;
            
            const grid = body.querySelector('.app-grid');
            Object.keys(DATABASE).forEach(key => {
                const f = DATABASE[key];
                const fType = f.type === 'mp4' ? 'video' : (f.type === 'jpg' ? 'image' : 'txt');
                if (fType !== type) return;
                if (f.private && !isUnlocked) return;

                const icon = document.createElement('div');
                icon.className = 'icon';
                icon.innerHTML = `
                    <div class="icon-img icon-${f.type === 'mp4' ? 'vid' : (f.type === 'jpg' ? 'img-file' : 'txt')}"></div>
                    <div class="icon-label">${f[currentLang] ? f[currentLang].title : f['es'].title}</div>
                `;
                icon.onclick = () => { body.closest('.desktop-window').remove(); openWindow(f); };
                grid.appendChild(icon);
            });
            
            if (document.getElementById('start-menu').style.display === 'flex') toggleStartMenu();
        }

        function handleCommand(raw) {
            const v = raw.trim(); if(!v) return;
            print(`${termPrompt.textContent} ${v}`, 'prompt');
            
            const lowV = v.toLowerCase();
            const parts = v.split(/\s+/);
            const cmd = parts[0].toLowerCase();
            const arg = parts[1] ? parts[1] : null;

            // Password check for desktop access
            if (v === '4C N4 RF' || (cmd === 'enter_remote' && v.includes('4C N4 RF')) || (cmd === 'login' && v.includes('4C N4 RF'))) {
                initiateRemoteAccess();
                return;
            }

            if (cmd === 'enter_remote' || cmd === 'login') {
                print("AUTHORIZATION REQUIRED. ENTER ACCESS KEY:", "system-msg");
                isWaitingForKey = true;
                termPrompt.textContent = "KEY: ";
                return;
            }

            if (isWaitingForKey) {
                if (v.toLowerCase() === 'flor') {
                    isUnlocked = true;
                    isWaitingForKey = false;
                    termPrompt.textContent = LOCALES[currentLang].prompt;
                    print("ACCESS GRANTED. DATA RECOVERED.", "system-msg");
                    COMMANDS.ls();
                } else {
                    print("INVALID KEY. ACCESS DENIED.", "system-msg");
                    isWaitingForKey = false;
                    termPrompt.textContent = LOCALES[currentLang].prompt;
                }
                return;
            }

            if (cmd === 'enter_remote' || cmd === 'remote' || cmd === 'desktop' || cmd === 'connect' || cmd === 'login') {
                if (!arg) {
                    print("AUTHENTICATION REQUIRED. PLEASE ENTER ACCESS KEY.", "system-msg");
                } else {
                    print("INVALID ACCESS KEY. DENIED.", "system-msg");
                }
                return;
            }

            if (cmd === 'status') {
                print("GATEWAY: F.F._RECOVERY.BAK", "system-msg");
                print("TARGET: ****** ****** (Evidence #404)");
                print("CONNECTION: STABLE");
                print("ENCRYPTION: AES-256 (BACKDOOR_ACTIVE)");
                return;
            }

            if (cmd === 'cat' || cmd === 'open') {
                const f = Object.values(DATABASE).find(x => (x[currentLang] && x[currentLang].title === arg) || (x['es'] && x['es'].title === arg) || Object.keys(DATABASE).find(k=>k===arg));
                if (f) openWindow(f); else print("FILE NOT FOUND.");
            } else if (COMMANDS[cmd]) {
                const res = COMMANDS[cmd](arg);
                if(res) print(res);
            } else {
                print("COMMAND NOT FOUND. TYPE 'HELP' FOR OPTIONS.");
            }
        }

        input.addEventListener('keydown', (e) => { if(e.key === 'Enter') { handleCommand(input.value); input.value = ''; } });
        input.addEventListener('focus', () => { setTimeout(() => { terminal.scrollTop = terminal.scrollHeight; }, 300); });
        
        // Global Escape Key to close windows
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                // 1. Close image/text visualizer if open
                if (windowOverlay.style.display === 'flex') {
                    closeWindow();
                    return;
                }
                
                // 2. Close validation puzzle if open
                if (captchaOverlay.style.display === 'flex') {
                    captchaOverlay.style.display = 'none';
                    return;
                }

                // 3. Close the last desktop window (folder/game)
                const windows = document.querySelectorAll('.desktop-window');
                if (windows.length > 0) {
                    const lastWindow = windows[windows.length - 1];
                    lastWindow.remove();
                    return;
                }

                // 4. Close start menu
                const menu = document.getElementById('start-menu');
                if (menu && menu.style.display === 'flex') menu.style.display = 'none';
            }
        });

        renderHeader();
        setTimeout(() => setLang('es'), 500);
    </script>
</body>
</html>
