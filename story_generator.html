<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Stories - Enigmas Argentinos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --amber-bg: #ffb000;
            --amber-ink: #000000;
            --amber-blood: #ff0000;
            
            --reino-bg: #000000;
            --reino-red: #ff0000;
            --reino-cyan: #00ffff;

            --sky-bg: #0d001a;
            --demon-red: #ff2200;
            --angel-white: #ffffff;
            --celestial-gold: #ffcc00;
        }

        body {
            margin: 0; background: #1a1a1a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; font-family: 'JetBrains Mono', monospace;
            color: white; padding: 20px;
        }

        .controls {
            margin-bottom: 20px;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            z-index: 100;
            width: 100%;
            max-width: 600px;
            border: 1px solid #444;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }

        input, select, button {
            padding: 10px;
            font-family: inherit;
            border: none;
            border-radius: 4px;
            background: #444;
            color: white;
        }

        button {
            cursor: pointer;
            background: var(--amber-bg);
            color: black;
            font-weight: bold;
            transition: 0.2s;
            grid-column: span 1;
        }

        button:hover { filter: brightness(1.2); }
        button.record { background: var(--reino-red); color: white; }
        button.recording { animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }

        #canvas-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            line-height: 0;
        }

        canvas {
            background: #000;
            border: 4px solid #fff;
            width: 360px;
            height: 640px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label>Variante Estética</label>
            <select id="variant-select" onchange="updateSettings()">
                <option value="amber">OJO DE ÁMBAR</option>
                <option value="reino">EL REINO</option>
                <option value="sky">CAÍDA DEL CIELO</option>
            </select>
        </div>
        <div class="control-group">
            <label>Clave</label>
            <input type="text" id="code-input" value="4C N4 RF" oninput="updateSettings()">
        </div>
        <div class="control-group">
            <label>Subtexto</label>
            <input type="text" id="subtext-input" value="Guarda esta clave. Pronto vas a necesitarla." oninput="updateSettings()">
        </div>
        <div class="control-group">
            <label>Tamaño Clave</label>
            <input type="range" id="code-size" min="20" max="100" value="60" oninput="updateSettings()">
        </div>
        <div class="control-group">
            <label>Tamaño Subtexto</label>
            <input type="range" id="subtext-size" min="10" max="50" value="24" oninput="updateSettings()">
        </div>
        <button onclick="downloadJPG()">Descargar JPG</button>
        <button id="record-btn" class="record" onclick="downloadVideo()">Descargar Video (6s Loop)</button>
        <div style="grid-column: span 2; font-size: 0.7rem; color: #888; text-align: center; margin-top: -10px;">
            * Los videos se bajan en WebM. Para máxima compatibilidad (Instagram/TikTok), ejecuta <b>convertir_video.py</b>.
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="story-canvas" width="720" height="1280"></canvas>
    </div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label>Variante Estética</label>
            <select id="variant-select" onchange="updateSettings()">
                <option value="amber">OJO DE ÁMBAR</option>
                <option value="reino">EL REINO</option>
                <option value="sky">CAÍDA DEL CIELO</option>
            </select>
        </div>
        <div class="control-group">
            <label>Clave</label>
            <input type="text" id="code-input" value="4C N4 RF" oninput="updateSettings()">
        </div>
        <div class="control-group">
            <label>Subtexto</label>
            <input type="text" id="subtext-input" value="Guarda esta clave. Pronto vas a necesitarla." oninput="updateSettings()">
        </div>
        <div class="control-group">
            <label>Tamaño Clave</label>
            <input type="range" id="code-size" min="20" max="100" value="60" oninput="updateSettings()">
        </div>
        <div class="control-group">
            <label>Tamaño Subtexto</label>
            <input type="range" id="subtext-size" min="10" max="50" value="24" oninput="updateSettings()">
        </div>
        <button onclick="downloadJPG()">Descargar JPG</button>
        <button id="record-btn" class="record" onclick="downloadVideo()">Descargar Video (MP4)</button>
        <div id="status-msg" style="grid-column: span 2; font-size: 0.7rem; color: #888; text-align: center; margin-top: -10px; line-height: 1.4;">
            * El video se convertirá a MP4 en tu navegador.<br>
            <span id="ffmpeg-log" style="color: var(--amber-bg); font-weight: bold;">Listo para procesar.</span>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="story-canvas" width="720" height="1280"></canvas>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true,
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
        });

        // Feedback de progreso
        ffmpeg.setProgress(({ ratio }) => {
            document.getElementById('ffmpeg-log').innerText = `Conversión: ${(ratio * 100).toFixed(0)}%`;
        });

        const canvas = document.getElementById('story-canvas');
        const ctx = canvas.getContext('2d');
        
        let settings = {
            variant: "amber",
            code: "4C N4 RF",
            subtext: "Guarda esta clave. Pronto vas a necesitarla.",
            codeSize: 60,
            subtextSize: 24
        };

        const themes = {
            amber: { bg: "#ffb000", ink: "#000000", accent: "#ff0000", label: "OJO_DE_ÁMBAR" },
            reino: { bg: "#000000", ink: "#ff0000", accent: "#00ffff", label: "EL_REINO" },
            sky: { bg: "#0d001a", ink: "#ff2200", accent: "#ffcc00", label: "CAÍDA_DEL_CIELO" }
        };

        function updateSettings() {
            settings.variant = document.getElementById('variant-select').value;
            settings.code = document.getElementById('code-input').value;
            settings.subtext = document.getElementById('subtext-input').value;
            settings.codeSize = parseInt(document.getElementById('code-size').value);
            settings.subtextSize = parseInt(document.getElementById('subtext-size').value);
            
            const t = themes[settings.variant];
            document.getElementById('record-btn').style.background = t.ink;
            document.getElementById('record-btn').style.color = t.bg === "#000000" ? "#fff" : t.bg;
        }

        let frame = 0;

        function draw() {
            frame++;
            const w = canvas.width;
            const h = canvas.height;
            const t = themes[settings.variant];

            const flicker = 0.95 + Math.random() * 0.05;
            ctx.globalAlpha = flicker;
            ctx.fillStyle = t.bg;
            ctx.fillRect(0, 0, w, h);

            if (settings.variant === 'reino') {
                ctx.fillStyle = t.ink;
                ctx.font = '20px JetBrains Mono';
                for(let i=0; i<10; i++) {
                    const gx = (Math.sin(frame*0.01 + i) * w/2) + w/2;
                    ctx.fillText("9 7 3", gx, i * 130);
                }
            }

            ctx.strokeStyle = t.ink;
            ctx.lineWidth = 4;
            for (let i = 0; i < 3; i++) {
                const s = (frame * (settings.variant === 'sky' ? 5 : 3) + i * 200) % 600;
                ctx.globalAlpha = (1 - s / 600) * flicker;
                ctx.beginPath();
                if (settings.variant === 'reino') {
                    ctx.strokeRect(w/2 - s, h/2 - s, s*2, s*2);
                } else {
                    ctx.arc(w/2, h/2, s, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            ctx.globalAlpha = flicker;
            ctx.fillStyle = t.ink;
            const centerX = w/2;
            const centerY = h/2;

            if (settings.variant === 'amber') {
                const eyeSize = 60 + Math.sin(frame * 0.1) * 5;
                ctx.beginPath(); ctx.arc(centerX, centerY, eyeSize, 0, Math.PI * 2); ctx.fill();
            } else if (settings.variant === 'reino') {
                ctx.beginPath(); ctx.arc(centerX, centerY, 50, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath();
                ctx.moveTo(centerX-30, centerY-10); ctx.lineTo(centerX-60, centerY-80); ctx.lineTo(centerX-10, centerY-20);
                ctx.moveTo(centerX+30, centerY-10); ctx.lineTo(centerX+60, centerY-80); ctx.lineTo(centerX+10, centerY-20);
                ctx.fill();
            } else if (settings.variant === 'sky') {
                ctx.shadowBlur = 20; ctx.shadowColor = t.ink;
                ctx.beginPath();
                ctx.moveTo(centerX-40, centerY+40); ctx.lineTo(centerX-30, centerY-10); ctx.lineTo(centerX, centerY-50);
                ctx.lineTo(centerX+30, centerY-10); ctx.lineTo(centerX+40, centerY+40); ctx.lineTo(centerX, centerY+20);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(centerX-24, centerY-30); ctx.lineTo(centerX-40, centerY-70); ctx.lineTo(centerX-10, centerY-36);
                ctx.moveTo(centerX+24, centerY-30); ctx.lineTo(centerX+40, centerY-70); ctx.lineTo(centerX+10, centerY-36);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.font = `bold ${settings.subtextSize * 2}px 'JetBrains Mono'`;
            ctx.fillStyle = t.ink;
            const lines = settings.subtext.split('. ');
            lines.forEach((line, i) => {
                ctx.fillText(line.toUpperCase() + (i < lines.length - 1 ? "." : ""), w/2, 150 + i * settings.subtextSize * 2.5);
            });

            const codeY = h - 250;
            ctx.font = `900 ${settings.codeSize * 2}px 'JetBrains Mono'`;
            const textWidth = ctx.measureText(settings.code.toUpperCase()).width;
            ctx.fillStyle = t.ink;
            ctx.fillRect(w/2 - textWidth/2 - 20, codeY - settings.codeSize - 20, textWidth + 40, settings.codeSize * 2 + 40);
            ctx.fillStyle = t.bg === "#000000" ? "#fff" : t.bg;
            if (settings.variant === 'sky') ctx.fillStyle = t.accent;
            ctx.shadowColor = t.accent; ctx.shadowBlur = 15;
            ctx.fillText(settings.code.toUpperCase(), w/2, codeY);
            ctx.shadowBlur = 0;

            ctx.fillStyle = t.ink;
            ctx.font = `bold 24px 'JetBrains Mono'`;
            ctx.fillText("ESTADO: TRANSMISIÓN INTERRUMPIDA", w/2, h - 80);
            ctx.font = `18px 'JetBrains Mono'`;
            ctx.fillText(`[ ${t.label}_SYSTEM_v2.0 ]`, w/2, h - 50);

            ctx.globalAlpha = 0.15;
            ctx.fillStyle = settings.variant === 'sky' ? t.accent : "#000";
            for (let i = 0; i < h; i += 8) { ctx.fillRect(0, i, w, 4); }
            ctx.globalAlpha = 1;

            requestAnimationFrame(draw);
        }

        document.fonts.ready.then(() => { draw(); updateSettings(); });

        function downloadJPG() {
            const link = document.createElement('a');
            link.download = `story_${settings.variant}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        }

        async function downloadVideo() {
            const btn = document.getElementById('record-btn');
            const msg = document.getElementById('ffmpeg-log');
            
            btn.innerText = "Grabando (6s)...";
            btn.classList.add('recording');
            btn.disabled = true;

            const chunks = [];
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                btn.innerText = "Cargando Motor...";
                msg.innerText = "Iniciando FFmpeg...";

                try {
                    const webmBlob = new Blob(chunks, { type: 'video/webm' });
                    
                    if (!ffmpeg.isLoaded()) {
                        await ffmpeg.load().catch(err => {
                            throw new Error("No se pudo cargar FFmpeg. Prueba abriendo el archivo con un servidor local (VS Code Live Server).");
                        });
                    }
                    
                    msg.innerText = "Procesando frames...";
                    ffmpeg.FS('writeFile', 'input.webm', await fetchFile(webmBlob));
                    
                    await ffmpeg.run('-i', 'input.webm', '-c:v', 'libx264', '-pix_fmt', 'yuv420p', '-preset', 'ultrafast', 'output.mp4');
                    
                    const data = ffmpeg.FS('readFile', 'output.mp4');
                    const mp4Blob = new Blob([data.buffer], { type: 'video/mp4' });
                    const url = URL.createObjectURL(mp4Blob);
                    
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `story_${settings.variant}.mp4`;
                    a.click();
                    
                    btn.innerText = "Descargar Video (MP4)";
                    btn.disabled = false;
                    msg.innerText = "¡Conversión exitosa!";
                } catch (error) {
                    console.error(error);
                    alert("Error en la conversión: " + error.message);
                    btn.innerText = "Error - Descargar WebM";
                    btn.disabled = false;
                    
                    // Fallback to WebM download
                    const webmBlob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(webmBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `story_${settings.variant}_fallback.webm`;
                    a.click();
                    msg.innerText = "Se descargó WebM como alternativa.";
                }
            };

            recorder.start();
            setTimeout(() => recorder.stop(), 6000);
        }
    </script>
</body>
