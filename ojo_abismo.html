<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL OJO DE ÁMBAR // AMBER_NEGATIVE_973</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --amber-bg: #ffb000;
            --amber-ink: #000000;
            --amber-blood: #ff0000;
        }

        body {
            margin: 0; padding: 0;
            background: var(--amber-bg);
            color: var(--amber-ink);
            font-family: 'JetBrains Mono', monospace;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            text-transform: uppercase;
        }

        #game-container {
            position: relative;
            border: 4px solid var(--amber-ink);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.2);
            background: var(--amber-bg);
            cursor: none;
        }

        canvas { display: block; background: var(--amber-bg); }

        .ui {
            position: absolute; top: -50px; width: 100%;
            display: flex; justify-content: space-between;
            font-size: 1.1rem; letter-spacing: 3px;
            font-weight: bold;
        }

        .overlay {
            position: absolute; inset: 0;
            background: var(--amber-bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; z-index: 20;
            border: 1px solid var(--amber-ink);
            cursor: default;
        }

        .btn {
            margin-top: 25px; padding: 12px 40px;
            border: 2px solid var(--amber-ink);
            background: transparent; color: var(--amber-ink);
            cursor: pointer; font-family: inherit;
            font-size: 1rem; transition: 0.2s;
            font-weight: 900; letter-spacing: 3px;
        }

        .btn:hover { background: var(--amber-ink); color: var(--amber-bg); }

        .flicker { animation: flicker 0.1s infinite; }
        @keyframes flicker { 
            0% { opacity: 0.9; transform: translateX(1px); } 
            50% { opacity: 1; transform: translateX(-1px); } 
            100% { opacity: 0.8; } 
        }

        /* Scanlines */
        #game-container::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.05) 50%, rgba(255, 176, 0, 0) 50%);
            z-index: 15; background-size: 100% 3px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui">
            <span>RESIDUOS: <span id="score">0</span> / <span id="target">50</span></span>
            <span>AMARRE: <span id="level">1</span></span>
            <span>CORDURA: <span id="sanity">100</span>%</span>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="overlay" class="overlay">
            <h1 class="flicker" style="font-size: 3rem; margin: 0; border-bottom: 5px solid #000;">EL OJO DE ÁMBAR</h1>
            <p style="letter-spacing: 2px; margin-top: 20px; font-weight: 700;">ATRAPADO EN LA RESINA DEL TIEMPO.<br>RECOLECTA 50 RESIDUOS PARA EL SIGUIENTE AMARRE.</p>
            <button class="btn" onclick="startGame()">BORRARSE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 600;

        let gameRunning = false;
        let score = 0;
        let level = 1;
        let sanity = 100;
        let bullets = [];
        let fragments = [];
        let mouseX = 300;
        let mouseY = 300;
        let frame = 0;
        const targetPerLevel = 50;

        class Bullet {
            constructor(x, y, angle, speed) {
                this.x = x; this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = 8 + Math.random() * 8;
                this.char = String.fromCharCode(0x2600 + Math.random() * 100);
                this.color = Math.random() > 0.8 ? '#ff0000' : '#000000';
            }
            update() { this.x += this.vx; this.y += this.vy; }
            draw() {
                ctx.fillStyle = this.color;
                ctx.font = `bold ${this.size * 2}px JetBrains Mono`;
                ctx.fillText(this.char, this.x, this.y);
            }
        }

        class Fragment {
            constructor() {
                this.x = 80 + Math.random() * 440;
                this.y = 80 + Math.random() * 440;
                this.rot = 0;
            }
            draw() {
                this.rot += 0.05;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rot);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.strokeRect(-12, -12, 24, 24);
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(-5, -5, 10, 10);
                ctx.restore();
            }
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            score = 0; level = 1; sanity = 100;
            bullets = []; fragments = []; gameRunning = true;
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('target').textContent = targetPerLevel;
            document.getElementById('level').textContent = level;
            document.getElementById('sanity').textContent = sanity;
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        function gameLoop() {
            if (!gameRunning) return;
            frame++;
            ctx.fillStyle = '#ffb000'; // Amber Background
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = 300, centerY = 300;
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            
            // Pulsing Rings
            for(let i=0; i<3; i++) {
                const s = (frame * (1 + level * 0.2) + i * 100) % 300;
                ctx.globalAlpha = 1 - (s / 300);
                ctx.strokeRect(centerX - s/2, centerY - s/2, s, s);
            }
            ctx.globalAlpha = 1;

            // Central Eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 45 + Math.sin(frame*0.1)*5, 0, Math.PI*2);
            ctx.fill();

            // Spawn Bullets
            if (frame % (Math.max(10, 25 - level * 3)) === 0) {
                const angle = Math.random() * Math.PI * 2;
                bullets.push(new Bullet(centerX, centerY, angle, 2.5 + level * 0.5 + Math.random()*2));
            }

            // Spawn Fragments
            if (fragments.length < 2 && Math.random() > 0.98) {
                fragments.push(new Fragment());
            }

            // Update & Draw Bullets
            bullets = bullets.filter(b => {
                b.update();
                b.draw();
                const dist = Math.hypot(b.x - mouseX, b.y - mouseY);
                if (dist < 20) {
                    sanity -= 2;
                    updateUI();
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(0,0,600,600);
                    return false;
                }
                return b.x > -100 && b.x < 700 && b.y > -100 && b.y < 700;
            });

            // Update & Draw Fragments
            fragments = fragments.filter(f => {
                f.draw();
                const dist = Math.hypot(f.x - mouseX, f.y - mouseY);
                if (dist < 25) {
                    score++;
                    updateUI();
                    if (score >= targetPerLevel) {
                        nextLevel();
                    }
                    return false;
                }
                return true;
            });

            // Draw Player (The Ink Blot)
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 10, 0, Math.PI*2);
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(mouseX, mouseY);
            ctx.lineTo(mouseX + Math.sin(frame*0.2)*12, mouseY + 18);
            ctx.stroke();

            if (sanity <= 0) endGame('TE HAS DISUELTO EN EL ÁMBAR.');
            else requestAnimationFrame(gameLoop);
        }

        function nextLevel() {
            level++;
            score = 0;
            sanity = 100; // Reset sanity
            if (level > 3) endGame('HAS TRASCENDIDO EL OJO DE ÁMBAR.');
            else {
                updateUI();
                bullets = [];
                fragments = [];
            }
        }

        function endGame(msg) {
            gameRunning = false;
            const overlay = document.getElementById('overlay');
            overlay.innerHTML = `<h1 class="flicker" style="font-size: 2rem;">${msg}</h1><button class="btn" onclick="startGame()">VOLVER A BORRARSE</button>`;
            overlay.style.display = 'flex';
        }
    </script>
</body>
</html>
